<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>대기 등록</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍽%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="logo">🍽</span><span id="storeBrand">대기 등록</span>
      <a href="/admin" class="admin-link" title="관리자 모드" aria-label="관리자 모드로 이동">⚙︎</a>
    </div>

    <h1 class="title">대기 등록</h1>
    <p class="subtitle">아래 정보를 입력하시면 대기 순번이 발급됩니다.<br/>자리가 준비되면 카카오톡으로 안내해 드립니다.</p>

    <div id="waitSummary" class="summary-card" style="display:none">
      <div class="summary-row">
        <span class="summary-label">현재 대기</span>
        <span class="summary-val"><b id="sumTeams">0</b>팀 · <b id="sumPeople">0</b>명</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">예상 대기시간</span>
        <span class="summary-val" id="sumEta">–</span>
      </div>
    </div>

    <form id="form" class="card" autocomplete="on">
      <label for="name">이름 <span class="hint">(호칭)</span></label>
      <input id="name" name="name" type="text" placeholder="예) 홍길동" required maxlength="20" />

      <label for="phone">연락처 <span class="hint">(카카오톡 안내용)</span></label>
      <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="010-1234-5678" maxlength="20" />

      <label>인원수</label>
      <div class="stepper">
        <button type="button" id="minus" aria-label="감소">−</button>
        <div class="val"><span id="partyVal">2</span>명</div>
        <button type="button" id="plus" aria-label="증가">＋</button>
      </div>
      <input type="hidden" id="partySize" value="2" />

      <label for="memo">요청사항 <span class="hint">(선택)</span></label>
      <textarea id="memo" name="memo" placeholder="예) 실내자리, 실외자리, 강아지포함" maxlength="200"></textarea>

      <div id="error" class="error"></div>
      <button type="submit" id="submit" class="btn">대기 등록하기</button>
    </form>

    <p class="center muted" style="margin-top:18px;font-size:13px">
      등록 후 실시간으로 내 순번을 확인할 수 있어요.
    </p>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    let party = 2;
    const partyVal = $('#partyVal');
    const partyInput = $('#partySize');
    function setParty(n) {
      party = Math.max(1, Math.min(50, n));
      partyVal.textContent = party;
      partyInput.value = party;
    }
    $('#minus').onclick = () => setParty(party - 1);
    $('#plus').onclick = () => setParty(party + 1);

    // 전화번호 자동 하이픈
    $('#phone').addEventListener('input', (e) => {
      let v = e.target.value.replace(/[^0-9]/g, '').slice(0, 11);
      if (v.length >= 4 && v.length < 8) v = v.replace(/(\d{3})(\d+)/, '$1-$2');
      else if (v.length >= 8) v = v.replace(/(\d{3})(\d{4})(\d+)/, '$1-$2-$3');
      e.target.value = v;
    });

    // 대기 요약(앞 팀·인원·예상 대기시간) + 가게 이름 표시
    async function loadSummary() {
      try {
        const res = await fetch('/api/summary');
        const d = await res.json();
        if (d.storeName) $('#storeBrand').textContent = d.storeName;
        $('#sumTeams').textContent = d.waitingTeams;
        $('#sumPeople').textContent = d.waitingPeople;
        const eta = d.estimatedWaitMinutes;
        $('#sumEta').textContent = d.waitingTeams === 0
          ? '🎉 바로 입장 가능'
          : (eta > 0 ? `약 ${eta}분` : '10분 이내');
        $('#waitSummary').style.display = 'block';
      } catch (e) { /* 무시 */ }
    }
    loadSummary();
    setInterval(loadSummary, 15000);

    const errBox = $('#error');
    function showError(msg) { errBox.textContent = msg; errBox.classList.add('show'); }

    $('#form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      const name = $('#name').value.trim();
      const phone = $('#phone').value.trim();
      const memo = $('#memo').value.trim();
      if (!name) return showError('이름을 입력해 주세요.');

      const btn = $('#submit');
      btn.disabled = true; btn.textContent = '등록 중...';
      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, partySize: party, memo }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '등록에 실패했습니다.');
        location.href = '/status/' + data.id;
      } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = '대기 등록하기';
      }
    });
  </script>
</body>
</html>
