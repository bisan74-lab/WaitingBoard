<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대기 관리 대시보드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍽%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container wide">
    <div class="topbar">
      <div class="brand"><span class="logo">🍽</span><span id="storeBrand">대기 관리</span></div>
      <div class="toolbar">
        <span id="kakaoMode" class="mode-badge">카카오: -</span>
        <button class="btn small secondary" id="qrBtn">📱 QR 코드</button>
        <button class="btn small secondary" id="settingsBtn">⚙︎ 설정</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="n" id="statWaiting">0</div><div class="l">대기중</div></div>
      <div class="stat"><div class="n" id="statCalled">0</div><div class="l">호출중</div></div>
      <div class="stat"><div class="n" id="statComing">0</div><div class="l">오는중</div></div>
      <div class="stat"><div class="n" id="statPeople">0</div><div class="l">대기 인원(명)</div></div>
    </div>

    <div id="list" class="list"></div>
    <div id="empty" class="empty" style="display:none">현재 대기 중인 손님이 없습니다.</div>
  </div>

  <!-- QR 모달 -->
  <div class="modal-backdrop" id="qrModal">
    <div class="modal qr-box">
      <h3 id="qrTitle">손님 등록 QR</h3>
      <div class="flex" style="margin-bottom:12px">
        <button class="btn small grow" id="qrTabCustomer">🧑 손님 등록</button>
        <button class="btn small secondary grow" id="qrTabAdmin">🔑 관리자 접속</button>
      </div>
      <p class="muted" id="qrDesc" style="font-size:13px">손님이 스캔하면 대기 등록 화면이 열립니다.</p>
      <img id="qrImg" alt="QR" />
      <p class="muted" id="qrUrl" style="font-size:12px;word-break:break-all"></p>
      <div class="flex" style="margin-top:10px">
        <button class="btn small secondary grow" id="qrPrint">🖨 인쇄</button>
        <button class="btn small grow" id="qrClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-backdrop" id="settingsModal">
    <div class="modal">
      <h3>설정</h3>

      <div class="section-label">연결 상태</div>
      <div id="healthBox" class="health"></div>

      <label for="storeName">가게 이름</label>
      <input id="storeName" type="text" maxlength="40" />
      <label for="tpl">카카오톡 호출 메시지 템플릿</label>
      <textarea id="tpl" maxlength="300"></textarea>
      <p class="muted" style="font-size:12px">치환자: <code>{name}</code> <code>{party}</code> <code>{store}</code> <code>{number}</code></p>
      <div id="settingsError" class="error"></div>
      <div class="flex" style="margin-top:14px">
        <button class="btn small secondary grow" id="settingsCancel">취소</button>
        <button class="btn small grow" id="settingsSave">저장</button>
      </div>

      <div class="section-label" style="margin-top:20px">위험 구역</div>
      <p class="muted" style="font-size:12px;margin:0 0 8px">대기목록을 모두 삭제하고 대기번호를 1번부터 다시 시작합니다. 되돌릴 수 없습니다.</p>
      <button class="btn small danger" id="resetBtn" style="width:100%">🗑 전체 초기화</button>
    </div>
  </div>

  <!-- 카카오 발송 모달 -->
  <div class="modal-backdrop" id="notifyModal">
    <div class="modal">
      <h3>카카오톡 호출</h3>
      <p class="muted" id="notifyWho" style="font-size:14px"></p>
      <label for="notifyMsg">보낼 메시지</label>
      <textarea id="notifyMsg" style="min-height:110px" maxlength="300"></textarea>
      <div id="notifyError" class="error"></div>
      <div class="flex" style="margin-top:14px">
        <button class="btn small secondary grow" id="notifyCancel">취소</button>
        <button class="btn small grow" id="notifySend">📨 카카오톡 보내기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const $ = (s) => document.querySelector(s);
    let PASSCODE = sessionStorage.getItem('adminPasscode') || '';
    // QR로 접속 시 URL의 ?passcode= 를 받아 자동 로그인. 이후 주소창에서 제거(보안).
    (function ingestPasscode() {
      const p = new URLSearchParams(location.search).get('passcode');
      if (p) {
        PASSCODE = p;
        sessionStorage.setItem('adminPasscode', p);
        history.replaceState(null, '', location.pathname + location.hash);
      }
    })();
    let settings = { storeName: '', messageTemplate: '' };
    let entries = [];

    function authHeaders() {
      return PASSCODE ? { 'x-admin-passcode': PASSCODE } : {};
    }
    async function api(url, opts = {}) {
      const res = await fetch(url, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...authHeaders(), ...(opts.headers || {}) },
      });
      if (res.status === 401) {
        const code = prompt('관리자 암호를 입력하세요');
        if (code) { PASSCODE = code; sessionStorage.setItem('adminPasscode', code); return api(url, opts); }
        throw new Error('인증이 필요합니다.');
      }
      return res;
    }

    function toast(msg, type = '') {
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => (t.className = 'toast'), 2600);
    }

    function elapsed(iso) {
      const min = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
      if (min < 1) return '방금';
      if (min < 60) return `${min}분 대기`;
      return `${Math.floor(min / 60)}시간 ${min % 60}분 대기`;
    }
    function maskPhone(p) {
      if (!p) return '연락처 없음';
      return p.replace(/(\d{3})-?(\d{3,4})-?(\d{4})/, '$1-$2-$3');
    }

    const STATUS_PILL = {
      waiting: ['대기중', 'waiting'],
      called: ['호출중', 'called'],
      coming: ['오는중', 'coming'],
      seated: ['처리완료', 'seated'],
      cancelled: ['취소', 'cancelled'],
    };

    function telDigits(p) { return String(p || '').replace(/[^0-9]/g, ''); }

    // 클립보드 복사 (HTTPS/최신 브라우저는 clipboard API, 아니면 execCommand 폴백)
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (_) {
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return ok;
        } catch (__) { return false; }
      }
    }

    // 손님에게 보낼 호출 메시지(설정의 카카오 템플릿과 동일)
    function messageFor(e) { return renderTpl(settings.messageTemplate, e); }

    // 호출 알림(문자/카톡)을 보냈으면 대기중 → 호출중으로 표시(대시보드 반영).
    // 이미 호출중/오는중/처리완료/취소면 그대로 둔다(오는중을 되돌리지 않음).
    async function markCalled(id) {
      const e = entries.find((x) => x.id === id);
      if (!e || e.status !== 'waiting') return;
      try {
        await api(`/api/waitlist/${id}/status`, { method: 'POST', body: JSON.stringify({ status: 'called' }) });
        e.status = 'called';
        e.calledAt = e.calledAt || new Date().toISOString();
        render();
      } catch (_) { /* 표시 갱신 실패해도 발송은 진행 */ }
    }

    // 💬 문자(기본 호출 수단): 문자앱을 받는사람 번호 + 메시지 내용까지 채운 채로 연다. (내용은 클립보드에도 복사)
    async function sendSms(id) {
      const e = entries.find((x) => x.id === id);
      if (!e) return;
      const digits = telDigits(e.phone);
      if (!digits) { toast('연락처가 없습니다.', 'err'); return; }
      const msg = messageFor(e);
      await copyText(msg); // 일부 기기가 body 자동입력을 무시해도 붙여넣기로 대비
      markCalled(id); // 발송과 동시에 '호출중'으로 표시(배경 처리)
      // iOS는 sms:번호&body=, Android는 sms:번호?body= 형식을 사용
      const ios = /iP(hone|ad|od)/.test(navigator.userAgent);
      const sep = ios ? '&' : '?';
      window.location.href = `sms:${digits}${sep}body=${encodeURIComponent(msg)}`;
      toast('문자앱을 엽니다 · 호출중으로 표시', 'ok');
    }

    // 🟡 카톡(보조·단골용): 메시지를 복사한 뒤 카카오톡 앱을 연다. (카카오는 받는사람·내용 자동입력 불가 → 손님 대화방에 붙여넣기)
    async function sendKakao(id) {
      const e = entries.find((x) => x.id === id);
      if (!e) return;
      const ok = await copyText(messageFor(e));
      markCalled(id); // 발송과 동시에 '호출중'으로 표시(배경 처리)
      toast(ok ? '메시지 복사됨 · 카톡 대화방에 붙여넣기 · 호출중으로 표시' : '복사 실패 — 길게 눌러 직접 복사하세요', ok ? 'ok' : 'err');
      // 카카오톡 앱 열기 시도(설치돼 있으면 앱이 열림). 데스크톱/미설치 기기에서는 무시됩니다.
      setTimeout(() => { window.location.href = 'kakaotalk://'; }, 500);
    }

    function rowHtml(e, done) {
      const [plabel, pcls] = STATUS_PILL[e.status] || STATUS_PILL.waiting;
      const digits = telDigits(e.phone);
      // 호출 횟수/오는중 표기
      let extra = '';
      if (e.status === 'called' && e.notifiedCount) extra = ` · 📨 ${e.notifiedCount}회 호출(1분마다 재호출)`;
      else if (e.status === 'coming') extra = ' · 🚶 오는 중(재호출 중지)';
      else if (e.notifiedCount) extra = ` · 📨 ${e.notifiedCount}회`;

      let actions;
      if (done) {
        // 처리완료: 되돌리기만 제공
        actions = `<button class="btn small secondary" data-undo="${e.id}">↩︎ 되돌리기</button>`;
      } else {
        const callBtn = digits
          ? `<a class="btn small callbtn" href="tel:${digits}">📞 전화</a>`
          : `<button class="btn small callbtn" disabled>📞 없음</button>`;
        const smsBtn = digits
          ? `<button class="btn small smsbtn" data-sms="${e.id}">💬 문자</button>`
          : '';
        const kakaoBtn = `<button class="btn small kakaobtn" data-kakao="${e.id}">🟡 카톡</button>`;
        const comingBtn = e.status === 'coming'
          ? ''
          : `<button class="btn small secondary" data-coming="${e.id}">🚶 오는중</button>`;
        // 💬 문자 = 기본 호출 수단(맨 앞·강조). 📨 호출(데모 알림톡)은 대행사 미사용으로 제거.
        actions = `
          ${smsBtn}
          ${callBtn}
          ${kakaoBtn}
          ${comingBtn}
          <button class="btn small secondary" data-seat="${e.id}">✅ 처리완료</button>
          <button class="btn small secondary" data-cancel="${e.id}">✕ 취소</button>`;
      }

      return `
      <div class="row ${e.status}${done ? ' done' : ''}">
        <div class="num">${e.number}</div>
        <div class="who">
          <div class="name">${escapeHtml(e.name)} <span class="pill ${pcls}" style="margin-left:6px">${plabel}</span></div>
          <div class="meta">${e.partySize}명 · ${maskPhone(e.phone)} · ${elapsed(e.createdAt)}${extra}</div>
          ${e.memo ? `<div class="meta">📝 ${escapeHtml(e.memo)}</div>` : ''}
        </div>
        <div class="actions">${actions}</div>
      </div>`;
    }

    // 오늘(브라우저 로컬=매장 시간) 등록건인지
    function isToday(iso) {
      if (!iso) return false;
      const d = new Date(iso), n = new Date();
      return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
    }

    function render() {
      // 활성(대기·호출·오는중)은 번호순 상단, 처리완료는 하단에 회색+취소선. 취소건은 숨김.
      // 대기번호가 매일 리셋되므로, 처리완료는 오늘 건만 표시(이전 날 번호와 겹치지 않도록).
      const active = entries
        .filter((e) => e.status === 'waiting' || e.status === 'called' || e.status === 'coming')
        .sort((a, b) => a.number - b.number);
      const done = entries
        .filter((e) => e.status === 'seated' && isToday(e.createdAt))
        .sort((a, b) => b.number - a.number);

      $('#statWaiting').textContent = active.filter((e) => e.status === 'waiting').length;
      $('#statCalled').textContent = active.filter((e) => e.status === 'called').length;
      $('#statComing').textContent = active.filter((e) => e.status === 'coming').length;
      $('#statPeople').textContent = active.reduce((s, e) => s + (e.partySize || 0), 0);

      const list = $('#list');
      $('#empty').style.display = active.length || done.length ? 'none' : 'block';
      list.innerHTML =
        active.map((e) => rowHtml(e, false)).join('') +
        (done.length ? `<div class="done-label">처리완료 ${done.length}건</div>` : '') +
        done.map((e) => rowHtml(e, true)).join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // 이벤트 위임
    $('#list').addEventListener('click', (e) => {
      const t = e.target.closest('button');
      if (!t) return;
      if (t.dataset.sms) sendSms(t.dataset.sms);
      else if (t.dataset.kakao) sendKakao(t.dataset.kakao);
      else if (t.dataset.coming) setStatus(t.dataset.coming, 'coming');
      else if (t.dataset.seat) setStatus(t.dataset.seat, 'seated');
      else if (t.dataset.undo) setStatus(t.dataset.undo, 'waiting');
      else if (t.dataset.cancel) {
        if (confirm('대기를 취소할까요?')) setStatus(t.dataset.cancel, 'cancelled');
      }
    });

    const STATUS_MSG = { seated: '처리완료했습니다.', coming: '오는중으로 표시했습니다(재호출 중지).', cancelled: '취소했습니다.', waiting: '대기중으로 되돌렸습니다.' };
    async function setStatus(id, status) {
      try {
        const res = await api(`/api/waitlist/${id}/status`, { method: 'POST', body: JSON.stringify({ status }) });
        if (!res.ok) throw new Error((await res.json()).error);
        // 즉시 반영
        const e = entries.find((x) => x.id === id); if (e) e.status = status;
        render();
        toast(STATUS_MSG[status] || '처리했습니다.', 'ok');
      } catch (err) { toast(err.message || '처리 실패', 'err'); }
    }

    // ----- 카카오 발송 모달 -----
    let notifyTargetId = null;
    function renderTpl(tpl, e) {
      return tpl.replace(/\{name\}/g, e.name).replace(/\{party\}/g, e.partySize)
        .replace(/\{store\}/g, settings.storeName).replace(/\{number\}/g, e.number);
    }
    function openNotify(id) {
      const e = entries.find((x) => x.id === id);
      if (!e) return;
      notifyTargetId = id;
      $('#notifyWho').textContent = `${e.number}번 · ${e.name}님 (${e.partySize}명) · ${maskPhone(e.phone)}`;
      $('#notifyMsg').value = renderTpl(settings.messageTemplate, e);
      $('#notifyError').classList.remove('show');
      $('#notifyModal').classList.add('show');
    }
    $('#notifyCancel').onclick = () => $('#notifyModal').classList.remove('show');
    $('#notifySend').onclick = async () => {
      const btn = $('#notifySend');
      btn.disabled = true;
      try {
        const res = await api(`/api/waitlist/${notifyTargetId}/notify`, {
          method: 'POST', body: JSON.stringify({ message: $('#notifyMsg').value }),
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || '발송 실패');
        $('#notifyModal').classList.remove('show');
        toast(d.mode === 'demo' ? '데모 모드: 호출 처리(실제 발송 없음)' : '카카오톡을 발송했습니다.', 'ok');
      } catch (err) {
        const box = $('#notifyError'); box.textContent = err.message; box.classList.add('show');
      } finally { btn.disabled = false; }
    };

    // ----- QR 모달 -----
    let currentQrType = 'customer';
    async function loadQr(type) {
      currentQrType = type;
      const isAdmin = type === 'admin';
      $('#qrTitle').textContent = isAdmin ? '관리자 접속 QR' : '손님 등록 QR';
      $('#qrDesc').innerHTML = isAdmin
        ? '스캔하면 <b>암호 입력 없이</b> 관리자 화면이 열립니다.<br/>⚠️ 암호가 포함된 QR이니 외부에 노출·게시하지 마세요.'
        : '손님이 스캔하면 대기 등록 화면이 열립니다.';
      $('#qrTabCustomer').className = 'btn small grow' + (isAdmin ? ' secondary' : '');
      $('#qrTabAdmin').className = 'btn small grow' + (isAdmin ? '' : ' secondary');
      $('#qrImg').removeAttribute('src');
      $('#qrUrl').textContent = '불러오는 중...';
      try {
        const res = isAdmin ? await api('/api/qr/admin') : await fetch('/api/qr');
        const d = await res.json();
        $('#qrImg').src = d.qr;
        $('#qrUrl').textContent = d.url;
      } catch (e) {
        $('#qrUrl').textContent = 'QR 생성 실패';
      }
    }
    $('#qrBtn').onclick = () => { $('#qrModal').classList.add('show'); loadQr('customer'); };
    $('#qrTabCustomer').onclick = () => loadQr('customer');
    $('#qrTabAdmin').onclick = () => loadQr('admin');
    $('#qrClose').onclick = () => $('#qrModal').classList.remove('show');
    $('#qrPrint').onclick = () => {
      const w = window.open('', '_blank');
      const sub = currentQrType === 'admin' ? '관리자 접속용 QR (외부 노출 주의)' : 'QR을 스캔하여 대기 등록하세요';
      w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:40px">
        <h2>${escapeHtml(settings.storeName || '대기')}</h2>
        <p>${sub}</p>
        <img src="${$('#qrImg').src}" style="width:340px"/></div>`);
      w.document.close(); w.focus(); w.print();
    };

    // ----- 설정 모달 -----
    const MODE_LABEL = { demo: '데모(발송 안 함)', solapi: 'Solapi 알림톡', nhncloud: 'NHN Cloud 알림톡', aligo: 'Aligo 알림톡', kakao_memo: '나에게보내기' };

    async function renderHealth() {
      const box = $('#healthBox');
      box.innerHTML = '<div class="muted" style="font-size:13px">확인 중…</div>';
      try {
        const res = await api('/api/health');
        const h = await res.json();
        const st = h.storage || {};
        const storageLabel = st.backend === 'redis' ? 'Redis(KV)' : '파일(로컬)';
        const live = h.messaging && h.messaging.live;
        const prov = h.messaging ? h.messaging.provider : 'demo';
        const warnStorage = h.serverless && st.backend !== 'redis';
        box.innerHTML = `
          <div class="hrow"><span>💾 저장소</span>
            <span><span class="dot ${st.connected ? 'ok' : 'bad'}"></span>${storageLabel} · ${st.connected ? '연결됨' : '오류'}</span></div>
          <div class="hrow"><span>📨 알림톡 발송</span>
            <span><span class="dot ${live ? 'ok' : 'off'}"></span>${MODE_LABEL[prov] || prov}</span></div>
          ${warnStorage ? '<div class="hwarn">⚠ Vercel 환경인데 KV가 없어 데이터가 유지되지 않습니다. Storage 탭에서 KV를 연결하세요.</div>' : ''}
          ${!live ? '<div class="hwarn">ℹ 실제 손님 발송을 하려면 알림톡 업체를 연동하세요(현재 데모).</div>' : ''}
        `;
      } catch (e) {
        box.innerHTML = '<div class="hwarn">상태 확인 실패</div>';
      }
    }

    $('#settingsBtn').onclick = () => {
      $('#storeName').value = settings.storeName;
      $('#tpl').value = settings.messageTemplate;
      $('#settingsError').classList.remove('show');
      $('#settingsModal').classList.add('show');
      renderHealth();
    };
    $('#settingsCancel').onclick = () => $('#settingsModal').classList.remove('show');
    $('#settingsSave').onclick = async () => {
      try {
        const res = await api('/api/settings', {
          method: 'PUT',
          body: JSON.stringify({ storeName: $('#storeName').value.trim(), messageTemplate: $('#tpl').value }),
        });
        if (!res.ok) throw new Error((await res.json()).error);
        settings = await res.json();
        applySettings();
        $('#settingsModal').classList.remove('show');
        toast('설정을 저장했습니다.', 'ok');
      } catch (err) {
        const box = $('#settingsError'); box.textContent = err.message; box.classList.add('show');
      }
    };

    // ----- 전체 초기화 -----
    $('#resetBtn').onclick = async () => {
      const n = entries.filter((e) => e.status === 'waiting' || e.status === 'called' || e.status === 'coming').length;
      if (!confirm(`대기목록을 모두 삭제하고 대기번호를 1번부터 다시 시작합니다.\n(현재 대기 ${n}팀)\n\n되돌릴 수 없습니다. 진행할까요?`)) return;
      const btn = $('#resetBtn');
      btn.disabled = true;
      try {
        const res = await api('/api/reset', { method: 'POST' });
        if (!res.ok) throw new Error((await res.json()).error || '초기화 실패');
        entries = [];
        render();
        $('#settingsModal').classList.remove('show');
        toast('초기화했습니다. 대기번호가 1번부터 시작됩니다.', 'ok');
      } catch (err) {
        const box = $('#settingsError'); box.textContent = err.message; box.classList.add('show');
      } finally {
        btn.disabled = false;
      }
    };

    function applySettings() {
      $('#storeBrand').textContent = settings.storeName || '대기 관리';
      document.title = (settings.storeName ? settings.storeName + ' · ' : '') + '대기 관리';
    }

    // 배경 클릭 시 닫기
    document.querySelectorAll('.modal-backdrop').forEach((m) => {
      m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('show'); });
    });

    // ----- 초기 로드 & 폴링 -----
    // 서버리스(Vercel)에서는 SSE 지속 연결이 유지되지 않으므로 주기적 폴링으로 갱신합니다.
    let loadInFlight = false;
    async function load() {
      if (loadInFlight) return;
      loadInFlight = true;
      try {
        const res = await api('/api/waitlist?all=1');
        if (!res.ok) throw new Error('목록 로드 실패');
        const d = await res.json();
        entries = d.entries; settings = d.settings;
        const shortLabel = { demo: '데모', solapi: 'Solapi 알림톡', nhncloud: 'NHN Cloud 알림톡', aligo: 'Aligo 알림톡', kakao_memo: '나에게보내기' };
        $('#kakaoMode').textContent = '발송: ' + (shortLabel[d.kakaoMode] || d.kakaoMode);
        applySettings(); render();
      } finally {
        loadInFlight = false;
      }
    }

    function startPolling() {
      // 탭이 보일 때만 폴링하여 불필요한 요청을 줄입니다.
      setInterval(() => {
        if (document.visibilityState === 'visible') load().catch(() => {});
      }, 4000);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') load().catch(() => {});
      });
      // 자동 재호출 보조 트리거(서버리스/대시보드 개방 시). 서버가 이미 처리해도
      // 멱등하므로 안전합니다. 로컬 미니PC는 서버 자체 타이머로 동작합니다.
      setInterval(() => {
        if (document.visibilityState === 'visible') api('/api/cron/recall', { method: 'POST' }).catch(() => {});
      }, 30000);
    }

    load().then(startPolling).catch((err) => toast(err.message, 'err'));
  </script>
</body>
</html>
